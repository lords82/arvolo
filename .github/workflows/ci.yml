name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-targets --locked
      - name: Test
        run: cargo test --locked
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Hard gate: licenses must stay compatible with the AGPL + commercial
      # dual-license model, sources must be crates.io, no banned crates.
      - name: License / sources / bans
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources
      # Informational: surface security advisories without blocking the build.
      # Current findings are transitive through iroh (see deny.toml).
      - name: Security advisories (non-blocking)
        uses: EmbarkStudios/cargo-deny-action@v2
        continue-on-error: true
        with:
          command: check advisories
