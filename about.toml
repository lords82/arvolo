# cargo-about configuration for generating THIRD-PARTY-LICENSES.md
# Regenerate with:  cargo about generate about.hbs > THIRD-PARTY-LICENSES.md
# The accepted set mirrors deny.toml's allow list.

accepted = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "MPL-2.0",
    "OpenSSL",
    "AGPL-3.0",
    "AGPL-3.0-only",
]

# ring ships several license files (it bundles BoringSSL bits).
[ring]
accepted = ["ISC", "MIT", "OpenSSL"]
